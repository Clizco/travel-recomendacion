<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TravelBloom | Contacto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav class="navbar simple-navbar">
      <a href="index.html" class="logo">TravelBloom</a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="about.html">Quiénes somos</a></li>
        <li><a href="contact.html">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-hero contact-hero">
      <h1>Contáctanos</h1>
      <p>¿Tienes preguntas o necesitas ayuda para planificar tu viaje? Escríbenos.</p>
    </section>

    <section class="contact-section">
      <form id="contactForm" class="contact-form">
        <label for="name">Nombre</label>
        <input type="text" id="name" name="name" placeholder="Escribe tu nombre" required />

        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required />

        <label for="message">Mensaje</label>
        <textarea id="message" name="message" placeholder="Escribe tu mensaje" required></textarea>

        <button type="submit">Enviar mensaje</button>
        <p id="formMessage" class="form-message"></p>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 TravelBloom. Todos los derechos reservados.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
